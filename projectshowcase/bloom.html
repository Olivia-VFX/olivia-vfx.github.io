<!DOCTYPE html>
<html>
  <head>
    <title>Bloom To-Do</title>
  <link rel="stylesheet" type="text/css" href="../../css/bloom.css">
  </head>

  <body>

    <h1>🌸 Bloom 🌸</h1>
  

    <!--Main content -->

    <div class="container">

      <!--To-do list -->
      <div class="todo-panel">

        <div class="task-input">
          <input id="myInput" placeholder="Add a task...">
          <button class="addBtn" onclick="newElement()">Add</button>
        </div>
        
        <ul id="myUL">
          <li>Item 1</li>
          <li class="checked">Item 2</li>
          <li>Item 3</li>
        </ul>
      </div>

      <!--Garden-->

  <div class="garden-panel">

    <div id="garden">
      <div id="plant">🌰</div>
    </div>

    </div>
  </div>

<!-- JavaScript-->
    <script src="../../javascript/bloom.js"></script>
  </body>
</html>
