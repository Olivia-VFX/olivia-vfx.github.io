<!DOCTYPE html>
<html>
  <head>
    <title>Bloom To-Do</title>
  <link rel="stylesheet" type="text/css" href="../../css/bloom.css">
  </head>

  <body>

    <div class="header">
      <h1>🌸 Bloom 🌸</h1>
    </div>
  

    <!--Main content -->

    <div class="container">

      <!--To-do list -->
      <div class="todo-panel">

        <div class="task-input">
          <input id="myInput" placeholder="Add a task...">
          <button class="addBtn" onclick="newElement()">Add</button>
        </div>
        
        <ul id="myUL">
        </ul>
      </div>

      <!--Garden-->

  <div class="garden-panel">

    <div id="garden">
      <div id="sky"></div>
      <div id="weather">☁️</div>
      <div class="cloud" style="top: 30px; animation-duration: 25s;">☁️</div>
      <div class="cloud" style="top: 80px; animation-duration: 18s;">☁️</div>
      <div class="cloud" style="top: 50px; animation-duration: 30s;">☁️</div>
      <div id="sparkles"></div>
      <div id="plant">🌰</div>
      <div id="ground"></div>
    </div>

    </div>
  </div>

    <a href="index.html" class="back-button">Back</a>

<!-- JavaScript-->
    <script src="../../javascript/bloom.js"></script>
  </body>
</html>
