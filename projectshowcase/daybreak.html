<!DOCTYPE html>
<html>
  <head> 
     <title>Daybreak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="../../css/daybreak.css">  
  </head> 

  <body>

    <div class="header">
      <h2>Daybreak</h2>

      <div id="message">Ready to begin?</div>
    </div>

    <div id="timerBox">
      <div id="time">25:00</div>
    </div>

    <div id="controls">
      <button id="startButton" onclick="startFocusSession()">Start Focus</button>
      <button id="pauseButton" onclick="pauseTimer()">Pause</button>
      <button id="resetButton" onclick="resetTimer()">Reset</button>
    </div>
  </div>

    <div id="sky">
      <div id="city">
        <svg id="citySky" viewBox="0 0 1000 220" preserveAspectRatio="none">
          <g id="backBuildings"></g>
          <g id="frontBuildings"></g>
        </svg>
      </div>
      <div id="sun"></div>
      <div id="moon"></div>
      <div id="stars"></div>
    </div>

    <script src="../../javascript/daybreak.js"></script>
  </body>
</html>
