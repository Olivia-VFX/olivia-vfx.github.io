<!DOCTYPE html>
<html>
  <head> 
     <title>Daybreak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="../../css/daybreak.css"> 
  </head> 

  <body>

    <div class="header">
      <h2>Daybreak</h2>

      <div id="message">Ready to begin?</div>
    </div>

    <div id="timerBox">
      <div id="time">25:00</div>
    </div>

    <div id="controls">
      <button id="startButton" onclick="startFocusSession()">Start Focus</button>
      <button id="pauseButton" onclick="pauseTimer()">Pause</button>
      <button id="resetButton" onclick="resetTimer()">Reset</button>
    </div>
  </div>

    <div id="sky">
      <div id="city">
        <svg viewBox="0 0 1000 200" preserveAspectRation="none">
          <rect x="0" y="80" width="60" height="120" class="building"/>
          <rect x="10" y="95" width="8" height="8" class="window" />
          <rect x="25" y="95" width="8" height="8" class="window" />
          <rect x="10" y="115" width="8" height="8" class="window" /> 
          
          <rect x="70" y="40" width="80" height="160" class="building"/>
          <rect x="80" y="95" width="8" height="8" class="window" />
          <rect x="95" y="95" width="8" height="8" class="window" />
          <rect x="80" y="115" width="8" height="8" class="window" />
          
          <rect x="160" y="100" width="50" height="100" class="building"/>
          <rect x="170" y="95" width="8" height="8" class="window" />
          <rect x="185" y="95" width="8" height="8" class="window" />
          <rect x="170" y="115" width="8" height="8" class="window" />
          
          <rect x="220" y="20" width="70" height="180" class="building"/>
          <rect x="230" y="95" width="8" height="8" class="window" />
          <rect x="245" y="95" width="8" height="8" class="window" />
          <rect x="230" y="115" width="8" height="8" class="window" />
          
          <rect x="310" y="110" width="90" height="10" class="building"/>
          <rect x="320" y="95" width="8" height="8" class="window" />
          <rect x="345" y="95" width="8" height="8" class="window" />
          <rect x="320" y="115" width="8" height="8" class="window" />
          
          <rect x="410" y="10" width="20" height="140" class="building"/>
          <rect x="420" y="95" width="8" height="8" class="window" />
          <rect x="435" y="95" width="8" height="8" class="window" />
          <rect x="420" y="115" width="8" height="8" class="window" />
          
          <rect x="440" y="70" width="40" height="150" class="building"/>
          <rect x="450" y="95" width="8" height="8" class="window" />
          <rect x="465" y="95" width="8" height="8" class="window" />
          <rect x="450" y="115" width="8" height="8" class="window" />
          
          <rect x="480" y="80" width="80" height="130" class="building"/>
          <rect x="490" y="95" width="8" height="8" class="window" />
          <rect x="505" y="95" width="8" height="8" class="window" />
          <rect x="490" y="115" width="8" height="8" class="window" />
          
          <rect x="570" y="20" width="160" height="190" class="building"/>
          <rect x="580" y="95" width="8" height="8" class="window" />
          <rect x="595" y="95" width="8" height="8" class="window" />
          <rect x="580" y="115" width="8" height="8" class="window" />
        </svg>
      </div>
      <div id="sun"></div>
      <div id="moon"></div>
      <div id="stars"></div>
    </div>

    <script src="../../javascript/daybreak.js"></script>
  </body>
</html>
